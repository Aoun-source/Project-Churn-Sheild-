name: ChurnShield CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml || echo "No tests yet — add them in tests/"

    - name: Smoke test — data loader
      run: |
        python -c "
        from src.data_loader import generate_synthetic_data, validate_data
        df = generate_synthetic_data(500)
        validate_data(df)
        print('✅ Data loader smoke test passed')
        "

    - name: Smoke test — feature engineering
      run: |
        python -c "
        from src.data_loader import generate_synthetic_data
        from src.feature_engineering import engineer_features
        df = generate_synthetic_data(500)
        df_eng = engineer_features(df)
        assert df_eng.shape[1] > df.shape[1], 'Feature engineering failed'
        print('✅ Feature engineering smoke test passed')
        "

    - name: Smoke test — full pipeline (quick mode)
      run: |
        python train.py --quick --skip-shap --skip-plots
